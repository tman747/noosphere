name: public testnet exact release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mind-market/wallet/**"
      - "crates/**"
      - "deploy/wwm/**"
      - "protocol/genesis/devnet-parameters.toml"
      - "site/**"
      - "tools/network_dashboard.py"
      - "tools/operations/wwm_*.py"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/public-testnet-release.yml"

permissions:
  contents: read

jobs:
  seal-linux-x86-64:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1
          rustc -vV
      - name: Test frozen API and release bundle assurance
        shell: bash
        run: |
          python tools/gates/check_api.py
          python -m unittest tools.operations.test_wwm_release_bundle
      - name: Seal exact-revision public-testnet bundle
        shell: bash
        run: |
          set -euo pipefail
          python tools/operations/wwm_release_bundle.py build \
            --out public-testnet-release \
            --revision "${GITHUB_SHA}" \
            --target-dir "${RUNNER_TEMP}/mindchain-public-testnet-target"
          python tools/operations/wwm_release_bundle.py verify \
            --bundle public-testnet-release
          python -m json.tool public-testnet-release/release-manifest.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mindchain-public-testnet-linux-x86-64-${{ github.sha }}
          path: public-testnet-release/
          if-no-files-found: error
          retention-days: 30
