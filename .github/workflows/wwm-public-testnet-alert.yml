name: WWM public testnet alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wwm-public-testnet-alert
  cancel-in-progress: true

jobs:
  probe:
    name: Public testnet alert probe
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out bound revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install pinned Python probe runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.5"

      - name: Probe public testnet and fail closed
        shell: bash
        run: >-
          python tools/operations/wwm_public_remote_probe.py
          --deployment deploy/wwm/public-testnet.json
