name: macOS node release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1
      - name: Build native release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p noos-node --bin noosd -p noos-indexer --bin noos-indexer -p noos-cli --bin noos-cli
      - name: Verify node and onboarding
        shell: bash
        run: |
          set -euo pipefail
          target/release/noosd --version
          target/release/noosd --help | grep -- "--devnet-witness"
          zsh -n tools/operator_onboard.command
          python tools/lan_testnet.py init --root "${RUNNER_TEMP}/mindchain-lan"
      - name: Record release evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p platform-evidence/macos/bin
          cp target/release/noosd target/release/noos-indexer target/release/noos-cli platform-evidence/macos/bin/
          rustc -vV > platform-evidence/macos/rustc.txt
          uname -a > platform-evidence/macos/uname.txt
          python - <<'PY'
          import hashlib, json, pathlib, platform
          root = pathlib.Path("platform-evidence/macos/bin")
          files = [{"file": path.name, "sha256": hashlib.sha256(path.read_bytes()).hexdigest()}
                   for path in sorted(root.iterdir())]
          evidence = {"schema": "noos/platform-build-evidence/v1", "platform": platform.platform(),
                      "machine": platform.machine(), "binaries": files}
          pathlib.Path("platform-evidence/macos/evidence.json").write_text(json.dumps(evidence, indent=2) + "\n")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mindchain-macos-node-${{ github.sha }}
          path: platform-evidence/macos/
          if-no-files-found: error
          retention-days: 30
