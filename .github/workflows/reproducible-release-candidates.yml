name: reproducible release candidates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  candidate:
    name: candidate ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x86_64
            runner: windows-2025
            rust_target: x86_64-pc-windows-msvc
          - target: linux-x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Check out bound revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install pinned Python orchestration runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.5"

      - name: Install pinned Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.4"
          cache: false

      - name: Discover and validate locked Windows toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $lock = Get-Content -Raw 'protocol/release/repro-toolchains-v1.json' | ConvertFrom-Json
          $target = $lock.targets.'windows-x86_64'
          $vswhereCommand = Get-Command vswhere.exe -ErrorAction SilentlyContinue
          if ($null -ne $vswhereCommand) {
            $vswhere = $vswhereCommand.Source
          } else {
            $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          }
          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found: $vswhere"
          }
          $installationRoots = @(
            @(& $vswhere -latest -products '*' -requires $target.msvc_component $target.windows_sdk_component -property installationPath) |
              Where-Object { $_ }
          )
          if ($LASTEXITCODE -ne 0 -or $installationRoots.Count -ne 1) {
            throw "expected one Visual Studio instance with locked components; found $($installationRoots.Count)"
          }
          $sdkRoot = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots').KitsRoot10
          if (-not $sdkRoot) {
            throw 'Windows KitsRoot10 registry value is missing'
          }
          $values = [ordered]@{
            NOOS_MSVC_ROOT = Join-Path $installationRoots[0] "VC\Tools\MSVC\$($target.msvc_tools_version)"
            NOOS_MSVC_TOOLS_VERSION = $target.msvc_tools_version
            NOOS_WINDOWS_SDK_ROOT = $sdkRoot
            NOOS_WINDOWS_SDK_VERSION = $target.windows_sdk_version
          }
          foreach ($entry in $values.GetEnumerator()) {
            Set-Item -Path "Env:$($entry.Key)" -Value $entry.Value
            "$($entry.Key)=$($entry.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          python tools/gates/repro_build.py validate-windows-toolchain

      - name: Install pinned Rust toolchain and acquire locked Cargo dependencies
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.1 --profile minimal --target "${{ matrix.rust_target }}"
          rustup default 1.96.1
          cargo fetch --locked --target "${{ matrix.rust_target }}"

      - name: Acquire complete locked Go module graph
        shell: bash
        working-directory: go
        env:
          GOTOOLCHAIN: local
          GOFLAGS: -mod=readonly
        run: |
          set -euo pipefail
          go mod download all
          git diff --exit-code -- go.mod go.sum
          GOPROXY=off GOSUMDB=off go mod verify
          GOPROXY=off GOSUMDB=off go list -mod=readonly -m all >/dev/null

      - name: Provision isolated offline dependency homes
        shell: bash
        run: |
          set -euo pipefail
          controlled="release/candidates/${{ matrix.target }}/.controlled-build"
          mkdir -p "$controlled/cargo-home" "$controlled/go-home/pkg"
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          for cache in registry git; do
            if [[ -d "$cargo_home/$cache" ]]; then cp -a "$cargo_home/$cache" "$controlled/cargo-home/$cache"; fi
          done
          go_mod_cache="$(go env GOMODCACHE)"
          if [[ -d "$go_mod_cache" ]]; then cp -a "$go_mod_cache" "$controlled/go-home/pkg/mod"; fi

      - name: Build offline deterministic candidate bundle
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-0.1.0-dev}"
          python tools/gates/generate_release.py \
            --target "${{ matrix.target }}" \
            --out "release/candidates/${{ matrix.target }}" \
            --version "$version" \
            --revision "$GITHUB_SHA" \
            --builder-profile github-hosted-owner-smoke \
            --smoke
        env:
          CARGO_HOME:
          RUSTFLAGS:
          CARGO_ENCODED_RUSTFLAGS:
          GOFLAGS:
          GOENV:
          GOWORK:
          GOMODCACHE:
          GOCACHE:

      - name: Publish public candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: noosphere-${{ matrix.target }}-${{ github.sha }}-candidate-smoke
          path: release/candidates/${{ matrix.target }}/
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  policy-boundary:
    name: external builder gate remains external
    runs-on: ubuntu-24.04
    needs: candidate
    steps:
      - name: Record workflow boundary
        shell: bash
        run: |
          echo "Candidate artifacts are SMOKE_ONLY downloadable evidence with promotion effect NONE."
          echo "This workflow has one repository control plane and cannot satisfy the two-external-builder gate."
          echo "No promotion or registry state is changed."
