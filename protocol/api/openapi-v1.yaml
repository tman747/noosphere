{
  "openapi": "3.1.0",
  "info": {"title": "MindChain NOOSPHERE Public API", "version": "1.0.0"},
  "jsonSchemaDialect": "https://json-schema.org/draft/2020-12/schema",
  "servers": [{"url": "https://api.example.invalid"}],
  "x-noos-contract": {
    "identity": {"wire_prefix": "NOOS", "address_hrp": "noos", "hash_encoding": "lowercase 64-hex without 0x", "integer_encoding": "base-10 JSON strings"},
    "negotiation": {"request_content_type": "application/json", "response_content_type": "application/vnd.noos.v1+json", "accepted_response_types": ["application/vnd.noos.v1+json", "application/json"], "unsupported_request_status": 415, "unacceptable_response_status": 406, "api_version_header": "NOOS-API-Version", "api_version": "v1"},
    "pagination": {"limit_default": 50, "limit_min": 1, "limit_max": 200, "cursor": {"encoding": "base64url-no-padding", "opaque": true, "payload_fields": ["v", "route", "sort", "last_key", "query_sha256"], "query_binding": "SHA-256 of canonical route plus all non-cursor query parameters; mismatch is invalid_cursor", "snapshot_binding": true}},
    "limits": {"max_request_bytes": 1048576, "max_submission_envelope_bytes": 1048576, "max_operator_response_bytes": 65536, "max_page_limit": 200},
    "submission": {"forwarding": "After a fresh authenticated noosd /status identity check, forward the exact validated {tx,witnesses} request bytes to /submit_tx", "indexed_truth": "Submission never creates a local transaction row; ingestion is the sole source of indexed mempool and chain state", "success": "202 is returned only after noosd returns accepted=true and a canonical txid"},
    "error_registry": {
      "invalid_request": {"status": 400}, "invalid_cursor": {"status": 400}, "wrong_protocol_identity": {"status": 400},
      "not_found": {"status": 404}, "not_acceptable": {"status": 406}, "feature_disabled": {"status": 409}, "txid_conflict": {"status": 409}, "node_refused": {"status": 409},
      "payload_too_large": {"status": 413}, "unsupported_media_type": {"status": 415}, "validation_failed": {"status": 422}, "rate_limited": {"status": 429}, "internal_error": {"status": 500}, "unavailable": {"status": 503}
    }
  },
  "paths": {
    "/api/status": {"get": {"operationId": "getStatus", "responses": {"200": {"description": "Identity and independently reported chain coordinates", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Status"}}}}, "406": {"$ref": "#/components/responses/NotAcceptable"}, "503": {"$ref": "#/components/responses/Unavailable"}}}},
    "/api/v1/blocks": {"get": {"operationId": "listBlocks", "x-stable-sort": ["height:desc", "hash:asc"], "parameters": [{"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/BlockPage"}, "400": {"$ref": "#/components/responses/BadRequest"}, "406": {"$ref": "#/components/responses/NotAcceptable"}}}},
    "/api/v1/blocks/{hash_or_height}": {"get": {"operationId": "getBlock", "parameters": [{"$ref": "#/components/parameters/HashOrHeight"}], "responses": {"200": {"description": "Block", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Block"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}, "404": {"$ref": "#/components/responses/NotFound"}}}},
    "/api/v1/transactions/{txid}": {"get": {"operationId": "getTransaction", "parameters": [{"$ref": "#/components/parameters/TxId"}], "responses": {"200": {"description": "Transaction with explicit state", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Transaction"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}, "404": {"$ref": "#/components/responses/NotFound"}}}},
    "/api/v1/transactions": {"post": {"operationId": "submitTransaction", "description": "Forwards the exact canonical noosd envelope after an authenticated identity check. This route does not insert indexed transaction state.", "requestBody": {"required": true, "content": {"application/json": {"schema": {"$ref": "#/components/schemas/SubmitTransactionRequest"}}}}, "responses": {"202": {"$ref": "#/components/responses/TransactionResult"}, "400": {"$ref": "#/components/responses/BadRequest"}, "409": {"description": "Node refused admission", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Error"}}}}, "413": {"$ref": "#/components/responses/PayloadTooLarge"}, "415": {"$ref": "#/components/responses/UnsupportedMediaType"}, "422": {"$ref": "#/components/responses/ValidationFailed"}, "429": {"$ref": "#/components/responses/RateLimited"}, "503": {"$ref": "#/components/responses/Unavailable"}}}},
    "/api/v1/notes/{noteid}": {"get": {"operationId": "getNote", "parameters": [{"$ref": "#/components/parameters/NoteId"}], "responses": {"200": {"description": "Note", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Note"}}}}, "404": {"$ref": "#/components/responses/NotFound"}}}},
    "/api/v1/addresses/{address}/notes": {"get": {"operationId": "listAddressNotes", "x-stable-sort": ["created_height:desc", "note_id:asc"], "parameters": [{"$ref": "#/components/parameters/Address"}, {"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"description": "Note page", "content": {"application/vnd.noos.v1+json": {"schema": {"allOf": [{"$ref": "#/components/schemas/Page"}, {"properties": {"items": {"type": "array", "items": {"$ref": "#/components/schemas/Note"}}}}]}}}}, "400": {"$ref": "#/components/responses/BadRequest"}}}},
    "/api/v1/addresses/{address}/balance": {"get": {"operationId": "getAddressBalance", "parameters": [{"$ref": "#/components/parameters/Address"}], "responses": {"200": {"description": "Finalized and unsafe balances are not conflated", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Balance"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}}}},
    "/api/v1/addresses/{address}/history": {"get": {"operationId": "listAddressHistory", "x-stable-sort": ["event_height:desc", "event_index:desc", "event_id:asc"], "parameters": [{"$ref": "#/components/parameters/Address"}, {"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/HistoryPage"}, "400": {"$ref": "#/components/responses/BadRequest"}}}},
    "/api/v1/nodes": {"get": {"operationId": "listNodes", "x-stable-sort": ["node_id:asc"], "parameters": [{"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/NodePage"}}}},
    "/api/v1/workers": {"get": {"operationId": "listWorkers", "x-feature": "work_loom", "x-stable-sort": ["worker_id:asc"], "parameters": [{"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/WorkerPage"}, "409": {"$ref": "#/components/responses/FeatureDisabled"}}}},
    "/api/v1/objects/{objectid}": {"get": {"operationId": "getObject", "parameters": [{"$ref": "#/components/parameters/ObjectId"}], "responses": {"200": {"description": "Object", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/LedgerObject"}}}}, "404": {"$ref": "#/components/responses/NotFound"}}}},
    "/api/v1/models": {"get": {"operationId": "listModels", "x-feature": "neural_lane", "x-stable-sort": ["model_id:asc", "revision:desc"], "parameters": [{"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/ModelPage"}, "409": {"$ref": "#/components/responses/FeatureDisabled"}}}},
    "/api/v1/jobs": {"get": {"operationId": "listJobs", "x-feature": "work_loom", "x-stable-sort": ["created_height:desc", "job_id:asc"], "parameters": [{"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/JobPage"}, "409": {"$ref": "#/components/responses/FeatureDisabled"}}}},
    "/api/v1/jobs/{jobid}/chunks": {"get": {"operationId": "listJobChunks", "x-feature": "neural_lane", "x-stable-sort": ["chunk_index:asc", "chunk_id:asc"], "parameters": [{"$ref": "#/components/parameters/JobId"}, {"$ref": "#/components/parameters/Limit"}, {"$ref": "#/components/parameters/Cursor"}], "responses": {"200": {"$ref": "#/components/responses/ChunkPage"}, "409": {"$ref": "#/components/responses/FeatureDisabled"}}}},
    "/api/v1/receipts/{receiptid}": {"get": {"operationId": "getReceipt", "parameters": [{"$ref": "#/components/parameters/ReceiptId"}], "responses": {"200": {"description": "Receipt", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Receipt"}}}}, "404": {"$ref": "#/components/responses/NotFound"}}}},
    "/api/v1/disputes/{disputeid}": {"get": {"operationId": "getDispute", "x-feature": "neural_lane", "parameters": [{"$ref": "#/components/parameters/DisputeId"}], "responses": {"200": {"description": "Dispute", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Dispute"}}}}, "404": {"$ref": "#/components/responses/NotFound"}, "409": {"$ref": "#/components/responses/FeatureDisabled"}}}},
    "/api/v1/evidence/{mechanism_id}": {"get": {"operationId": "getEvidence", "parameters": [{"$ref": "#/components/parameters/MechanismId"}], "responses": {"200": {"description": "Evidence registry view", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Evidence"}}}}, "404": {"$ref": "#/components/responses/NotFound"}}}}
  },
  "components": {
    "parameters": {
      "Limit": {"name": "limit", "in": "query", "required": false, "schema": {"type": "integer", "minimum": 1, "maximum": 200, "default": 50}},
      "Cursor": {"name": "cursor", "in": "query", "required": false, "schema": {"$ref": "#/components/schemas/Cursor"}},
      "HashOrHeight": {"name": "hash_or_height", "in": "path", "required": true, "schema": {"oneOf": [{"$ref": "#/components/schemas/Hash32"}, {"$ref": "#/components/schemas/U64"}]}},
      "TxId": {"name": "txid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}}, "NoteId": {"name": "noteid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}},
      "ObjectId": {"name": "objectid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}}, "JobId": {"name": "jobid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}},
      "ReceiptId": {"name": "receiptid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}}, "DisputeId": {"name": "disputeid", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Hash32"}},
      "Address": {"name": "address", "in": "path", "required": true, "schema": {"$ref": "#/components/schemas/Address"}}, "MechanismId": {"name": "mechanism_id", "in": "path", "required": true, "schema": {"type": "string", "pattern": "^[A-Z][A-Z0-9_-]{1,63}$"}}
    },
    "schemas": {
      "Hash32": {"type": "string", "pattern": "^[0-9a-f]{64}$"}, "U64": {"type": "string", "pattern": "^(0|[1-9][0-9]{0,19})$", "x-maximum-decimal": "18446744073709551615"}, "U128": {"type": "string", "pattern": "^(0|[1-9][0-9]{0,38})$", "x-maximum-decimal": "340282366920938463463374607431768211455"},
      "Address": {"type": "string", "pattern": "^noos1[023456789acdefghjklmnpqrstuvwxyz]{6,83}$", "x-format": "bech32m-strict", "description": "Canonical lowercase BIP-350 Bech32m; strict noos HRP, checksum, convertbits padding, version/type/payload and length validation required"},
      "Cursor": {"type": "string", "pattern": "^[A-Za-z0-9_-]+$", "maxLength": 2048, "x-no-padding": true},
      "Coordinate": {"type": "object", "additionalProperties": false, "required": ["height", "hash", "index"], "properties": {"height": {"$ref": "#/components/schemas/U64"}, "hash": {"$ref": "#/components/schemas/Hash32"}, "index": {"$ref": "#/components/schemas/U64"}}},
      "ChainPoint": {"type": "object", "additionalProperties": false, "required": ["height", "hash", "state_root"], "properties": {"height": {"$ref": "#/components/schemas/U64"}, "hash": {"$ref": "#/components/schemas/Hash32"}, "state_root": {"$ref": "#/components/schemas/Hash32"}}},
      "Status": {"type": "object", "additionalProperties": false, "required": ["chain_id", "genesis_hash", "protocol_version", "api_version", "release_version", "unsafe_head", "justified", "finalized", "freshness_ms", "evidence_registry_root"], "properties": {"chain_id": {"$ref": "#/components/schemas/Hash32"}, "genesis_hash": {"$ref": "#/components/schemas/Hash32"}, "protocol_version": {"const": "v1"}, "api_version": {"const": "v1"}, "release_version": {"type": "string", "minLength": 1}, "unsafe_head": {"$ref": "#/components/schemas/ChainPoint"}, "justified": {"$ref": "#/components/schemas/ChainPoint"}, "finalized": {"$ref": "#/components/schemas/ChainPoint"}, "freshness_ms": {"$ref": "#/components/schemas/U64"}, "evidence_registry_root": {"$ref": "#/components/schemas/Hash32"}}},
      "Page": {"type": "object", "additionalProperties": false, "required": ["items", "next_cursor"], "properties": {"items": {"type": "array", "maxItems": 200}, "next_cursor": {"oneOf": [{"$ref": "#/components/schemas/Cursor"}, {"type": "null"}]}}},
      "Block": {"type": "object", "additionalProperties": false, "required": ["hash", "height", "parent_hash", "slot", "epoch", "timestamp_ms", "execution_receipt_root", "lumen_receipts_state_root", "transaction_count"], "properties": {"hash": {"$ref": "#/components/schemas/Hash32"}, "height": {"$ref": "#/components/schemas/U64"}, "parent_hash": {"$ref": "#/components/schemas/Hash32"}, "slot": {"$ref": "#/components/schemas/U64"}, "epoch": {"$ref": "#/components/schemas/U64"}, "timestamp_ms": {"$ref": "#/components/schemas/U64"}, "execution_receipt_root": {"$ref": "#/components/schemas/Hash32"}, "lumen_receipts_state_root": {"$ref": "#/components/schemas/Hash32"}, "transaction_count": {"$ref": "#/components/schemas/U64"}}},
      "Transaction": {"type": "object", "additionalProperties": false, "required": ["txid", "wtxid", "state", "fee", "resource_counters"], "properties": {"txid": {"$ref": "#/components/schemas/Hash32"}, "wtxid": {"$ref": "#/components/schemas/Hash32"}, "state": {"enum": ["MEMPOOL", "INCLUDED", "JUSTIFIED", "FINALIZED", "REVERTED", "REJECTED"]}, "fee": {"$ref": "#/components/schemas/U128"}, "resource_counters": {"type": "object", "additionalProperties": {"$ref": "#/components/schemas/U64"}}, "inclusion": {"$ref": "#/components/schemas/Coordinate"}, "justification": {"$ref": "#/components/schemas/Coordinate"}, "finalization": {"$ref": "#/components/schemas/Coordinate"}, "rejection_code": {"type": "string"}}, "x-state-coordinate-law": {"MEMPOOL": [], "INCLUDED": ["inclusion"], "JUSTIFIED": ["inclusion", "justification"], "FINALIZED": ["inclusion", "justification", "finalization"], "REVERTED": ["inclusion"], "REJECTED": ["rejection_code"], "coordinates_not_listed": "MUST be absent; null is forbidden"}},
      "SubmitTransactionRequest": {"type": "object", "additionalProperties": false, "required": ["tx", "witnesses"], "properties": {"tx": {"type": "string", "pattern": "^(?:[0-9a-f]{2})*$", "description": "Canonical transaction bytes as lowercase even-length hex"}, "witnesses": {"type": "string", "pattern": "^(?:[0-9a-f]{2})*$", "description": "Canonical segregated witness bytes as lowercase even-length hex"}}, "x-exact-node-envelope": true, "x-combined-request-max-bytes": 1048576},
      "SubmitTransactionResponse": {"type": "object", "additionalProperties": false, "required": ["txid"], "properties": {"txid": {"$ref": "#/components/schemas/Hash32"}}, "description": "Node protocol txid after explicit node acceptance; this is not an indexed MEMPOOL claim"},
      "Note": {"type": "object", "additionalProperties": false, "required": ["note_id", "asset_id", "amount", "created_height", "spent"], "properties": {"note_id": {"$ref": "#/components/schemas/Hash32"}, "asset_id": {"$ref": "#/components/schemas/Hash32"}, "amount": {"$ref": "#/components/schemas/U128"}, "created_height": {"$ref": "#/components/schemas/U64"}, "spent": {"type": "boolean"}}},
      "Balance": {"type": "object", "additionalProperties": false, "required": ["address", "asset_id", "finalized_amount", "unsafe_amount", "finalized_height", "unsafe_height"], "properties": {"address": {"$ref": "#/components/schemas/Address"}, "asset_id": {"$ref": "#/components/schemas/Hash32"}, "finalized_amount": {"$ref": "#/components/schemas/U128"}, "unsafe_amount": {"$ref": "#/components/schemas/U128"}, "finalized_height": {"$ref": "#/components/schemas/U64"}, "unsafe_height": {"$ref": "#/components/schemas/U64"}}},
      "HistoryEvent": {"type": "object", "additionalProperties": false, "required": ["event_id", "event_height", "event_index", "txid", "amount"], "properties": {"event_id": {"$ref": "#/components/schemas/Hash32"}, "event_height": {"$ref": "#/components/schemas/U64"}, "event_index": {"$ref": "#/components/schemas/U64"}, "txid": {"$ref": "#/components/schemas/Hash32"}, "amount": {"$ref": "#/components/schemas/U128"}}},
      "LedgerObject": {"type": "object", "additionalProperties": false, "required": ["object_id", "version", "owner", "data_hash"], "properties": {"object_id": {"$ref": "#/components/schemas/Hash32"}, "version": {"$ref": "#/components/schemas/U64"}, "owner": {"$ref": "#/components/schemas/Address"}, "data_hash": {"$ref": "#/components/schemas/Hash32"}}},
      "Node": {"type": "object", "additionalProperties": false, "required": ["node_id", "role", "status", "release_version", "unsafe_height", "justified_height", "finalized_height"], "properties": {"node_id": {"$ref": "#/components/schemas/Hash32"}, "role": {"enum": ["validator", "full", "observer", "light"]}, "status": {"enum": ["ONLINE", "STALE", "OFFLINE", "UNKNOWN"]}, "release_version": {"type": "string"}, "unsafe_height": {"$ref": "#/components/schemas/U64"}, "justified_height": {"$ref": "#/components/schemas/U64"}, "finalized_height": {"$ref": "#/components/schemas/U64"}}},
      "Worker": {"type": "object", "additionalProperties": false, "required": ["worker_id", "status", "bond", "profile_id"], "properties": {"worker_id": {"$ref": "#/components/schemas/Hash32"}, "status": {"enum": ["ACTIVE", "SUSPENDED", "EXITING"]}, "bond": {"$ref": "#/components/schemas/U128"}, "profile_id": {"type": "string", "minLength": 1}}},
      "Model": {"type": "object", "additionalProperties": false, "required": ["model_id", "revision", "profile_id", "enabled"], "properties": {"model_id": {"$ref": "#/components/schemas/Hash32"}, "revision": {"$ref": "#/components/schemas/U64"}, "profile_id": {"type": "string", "minLength": 1}, "enabled": {"type": "boolean"}}},
      "Job": {"type": "object", "additionalProperties": false, "required": ["job_id", "state", "created_height", "value", "finality_state"], "properties": {"job_id": {"$ref": "#/components/schemas/Hash32"}, "state": {"enum": ["FUNDED", "COMMITTED", "RUNNING", "DISPUTED", "SETTLED", "REFUNDED", "SLASHED"]}, "created_height": {"$ref": "#/components/schemas/U64"}, "value": {"$ref": "#/components/schemas/U128"}, "finality_state": {"enum": ["SOFT", "ANCHORED", "ASSURED", "TERMINAL"]}}},
      "Chunk": {"type": "object", "additionalProperties": false, "required": ["chunk_id", "job_id", "chunk_index", "token_count", "availability"], "properties": {"chunk_id": {"$ref": "#/components/schemas/Hash32"}, "job_id": {"$ref": "#/components/schemas/Hash32"}, "chunk_index": {"$ref": "#/components/schemas/U64"}, "token_count": {"$ref": "#/components/schemas/U64"}, "availability": {"enum": ["PENDING", "AVAILABLE", "UNAVAILABLE"]}}},
      "Receipt": {"type": "object", "additionalProperties": false, "required": ["receipt_id", "txid", "height", "success", "resource_counters", "fee_charged"], "properties": {"receipt_id": {"$ref": "#/components/schemas/Hash32"}, "txid": {"$ref": "#/components/schemas/Hash32"}, "height": {"$ref": "#/components/schemas/U64"}, "success": {"type": "boolean"}, "resource_counters": {"type": "object", "additionalProperties": {"$ref": "#/components/schemas/U64"}}, "fee_charged": {"$ref": "#/components/schemas/U128"}}},
      "Dispute": {"type": "object", "additionalProperties": false, "required": ["dispute_id", "state", "round", "bytes", "duration_ms"], "properties": {"dispute_id": {"$ref": "#/components/schemas/Hash32"}, "state": {"enum": ["OPEN", "UPHELD", "REJECTED", "EXPIRED"]}, "round": {"$ref": "#/components/schemas/U64"}, "bytes": {"$ref": "#/components/schemas/U64"}, "duration_ms": {"$ref": "#/components/schemas/U64"}}},
      "Evidence": {"type": "object", "additionalProperties": false, "required": ["mechanism_id", "evidence_label", "implementation_status", "evidence_status", "lifecycle", "result", "enabled", "artifact_root"], "properties": {"mechanism_id": {"type": "string"}, "evidence_label": {"enum": ["BUILDABLE", "THEORY", "DREAM"]}, "implementation_status": {"enum": ["NOT_STARTED", "PARTIAL", "IMPLEMENTED"]}, "evidence_status": {"type": "string"}, "lifecycle": {"type": "string"}, "result": {"type": "string"}, "enabled": {"type": "boolean"}, "artifact_root": {"$ref": "#/components/schemas/Hash32"}}},
      "Error": {"type": "object", "additionalProperties": false, "required": ["code", "message", "request_id", "details"], "properties": {"code": {"enum": ["invalid_request", "invalid_cursor", "wrong_protocol_identity", "not_found", "not_acceptable", "feature_disabled", "txid_conflict", "node_refused", "payload_too_large", "unsupported_media_type", "validation_failed", "rate_limited", "internal_error", "unavailable"]}, "message": {"type": "string", "minLength": 1}, "request_id": {"type": "string", "minLength": 1}, "details": {"type": "object"}, "mechanism_id": {"type": "string"}, "evidence_ref": {"type": "string"}}, "x-feature-disabled-required": ["mechanism_id", "evidence_ref"]}
    },
    "responses": {
      "BadRequest": {"description": "Invalid request or cursor", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Error"}}}}, "NotFound": {"description": "Not found", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Error"}}}}, "NotAcceptable": {"description": "No acceptable v1 representation", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Error"}}}},
      "FeatureDisabled": {"description": "Mechanism is disabled", "content": {"application/vnd.noos.v1+json": {"schema": {"$ref": "#/components/schemas/Error"}, "example": {"code": "feature_disabled", "message": "mechanism disabled", "request_id": "req-1", "details": {}, "mechanism_id": "M-NEL", "evidence_ref": "/api/v1/evidence/M-NEL"}}}},
      "NodePage": {"description": "Stable node page", "content": {"application/vnd.noos.v1+json": {"schema": {"allOf": [{"$ref": "#/components/schemas/Page"}, {"properties": {"items": {"type": "array", "items": {"$ref": "#/components/schemas/Node"}}}}]}}}},
      "WorkerPage": {"description": "Stable worker page", "content": {"application/vnd.noos.v1+json": {"schema": {"allOf": [{"$ref": "#/components/schemas/Page"}, {"properties": {"items": {"type": "array", "items": {"$ref": "#/components/schemas/Worker"}}}}]}}}},
      "ModelPage": {"description": "Stable model page", "content": {"application/vnd.noos.v1+json": {"schema": {"allOf": [{"$ref": "#/components/schemas/Page"}, {"properties": {"items": {"type": "array", "items": {"$ref": "#/components/schemas/Model"}}}}]}}}},
      "JobPage": {"description": "Stable job page", "content": {"application/vnd.noos.v1+json": {"schema": {"allOf": [{"$ref": "#/components/schemas/Page"}, {"properties": {"items": {"type": "array", "items": {"$ref": "#/components/schemas/Job"}}}}]}}}},
