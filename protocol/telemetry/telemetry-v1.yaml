{
  "schema_version": 1,
  "namespace": "noos",
  "evaluation_interval_seconds": 15,
  "global_semantics": {
    "unknown_value": "UNKNOWN",
    "unknown_is_not_numeric": true,
    "unknown_is_never_zero_or_healthy": true,
    "absent": "UNKNOWN after one freshness_deadline",
    "stale": "UNKNOWN when sample age exceeds freshness_deadline_seconds",
    "malformed": "UNKNOWN and no numeric sample enters rules",
    "counter_reset": "valid reset event; rate windows crossing reset are UNKNOWN until a full clean window",
    "cardinality_overflow": "drop overflowing series, mark entire family UNKNOWN, increment noos_telemetry_contract_violations_total{reason=cardinality_overflow}",
    "gate_policy": "Any UNKNOWN dependency blocks promotion and opens its named alert; UNKNOWN never passes a threshold",
    "prohibited_labels": ["transaction", "txid", "address", "job", "job_id", "model_root", "block_hash", "receipt_id", "dispute_id", "peer_id", "request_id", "user_id"]
  },
  "metrics": [
    {"name":"noos_telemetry_contract_violations_total","type":"counter","unit":"violations","buckets":[],"help":"Telemetry contract violations by bounded reason.","producer":"telemetry-parser","labels":{"reason":["absent","stale","malformed","reset","cardinality_overflow"]},"cardinality_ceiling":5,"scrape_interval_seconds":15,"freshness_deadline_seconds":45,"aggregation":"sum by reason over 5m rate","window":"5m","unknown_semantics":"absent/stale/malformed family is UNKNOWN; reset is handled as reset","recording_rule":"noos:telemetry_contract_violations:rate5m","recording_expression":"sum by (reason) (rate(noos_telemetry_contract_violations_total[5m]))","alert":"NoosTelemetryContractViolation","alert_expression":"noos:telemetry_contract_violations:rate5m > 0 or unknown(noos:telemetry_contract_violations:rate5m)","severity":"critical","for":"1m","dashboard":"Telemetry Contract","release_gates":["G0","G1","G2","G3","G4","G5"]},
