[package]
name = "noos-wallet"
version = "0.1.0"
description = "NOOSPHERE purpose-separated wallet, keystore, planning, and chain identity gate"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
blake3 = "=1.8.5"
ed25519-dalek = "=2.2.0"
hkdf = "=0.12.4"
ring = "=0.17.14"
serde = { version = "=1.0.228", features = ["derive"] }
sha2 = "=0.10.9"
thiserror = "=2.0.18"
zeroize = { version = "=1.9.0", features = ["zeroize_derive"] }
noos-umbra = { path = "../noos-umbra" }
x25519-dalek = { version = "2", features = ["static_secrets"] }

[dev-dependencies]
hex = "=0.4.3"
serde_json = "=1.0.150"

[lints]
workspace = true
