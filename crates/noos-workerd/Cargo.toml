[package]
name = "noos-workerd"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Deterministic worker daemon: hearth job routing and custody admission, NEL verifier self-audit, domain-separated signed receipts, line-oriented telemetry bound to the frozen telemetry-v1 families."

[[bin]]
name = "noos-workerd"
path = "src/main.rs"

[dependencies]
axum = "=0.8.8"
attohttpc = "=0.30.1"
blake3 = "=1.8.5"
futures-util = "=0.3.32"
noos-codec = { path = "../noos-codec" }
noos-cli = { path = "../noos-cli" }
noos-crypto = { path = "../noos-crypto" }
noos-da = { path = "../noos-da" }
noos-hearth = { path = "../noos-hearth" }
noos-lumen = { path = "../noos-lumen" }
noos-node = { path = "../noos-node" }
noos-nel = { path = "../noos-nel" }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
sha2 = "=0.10.9"
tokio = { version = "=1.52.3", features = ["io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
toml = "=0.9.11"
tokio-stream = { version = "=0.1.18", features = ["sync"] }
zeroize = "=1.9.0"

[dev-dependencies]
noos-braid = { path = "../noos-braid" }
tempfile = "=3.24.0"
tower = { version = "=0.5.3", features = ["util"] }

[lints]
workspace = true
