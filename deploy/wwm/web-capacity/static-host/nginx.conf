# Include this server block from nginx.conf after placing the verified bundle at
# /srv/noos-wwm-web-capacity. Set NOOS_WWM_STATIC_HOST through envsubst or your
# configuration manager before starting nginx.
server {
    listen 443 ssl http2;
    server_name ${NOOS_WWM_STATIC_HOST};
    root /srv/noos-wwm-web-capacity;

    gzip off;
    etag on;

    location = /.well-known/noos/wwm-web-capacity-v1.json {
        try_files $uri =404;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /inventory-v1.json {
        try_files $uri =404;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=0, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /LICENSE.txt {
        try_files $uri =404;
        default_type text/plain;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /NOTICE.txt {
        try_files $uri =404;
        default_type text/plain;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ ^/shares/[0-9]{6}/[0-9]{2}\.share$ {
        try_files $uri =404;
        default_type application/octet-stream;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Accept-Ranges "bytes" always;
        add_header Cache-Control "public, max-age=31536000, immutable, no-transform" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
