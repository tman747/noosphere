global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - /etc/prometheus/alerts.yml
scrape_configs:
  - job_name: wwm-artifact-store
    static_configs:
      - targets: ["artifact-store:9761"]
  - job_name: wwm-custodian
    static_configs:
      - targets: ["custodian:9762"]
  - job_name: wwm-executor
    static_configs:
      - targets: ["executor:9763"]
  - job_name: wwm-edge
    static_configs:
      - targets: ["edge:9764"]
  - job_name: wwm-gateway
    static_configs:
      - targets: ["gateway:9765"]
